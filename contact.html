<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact – Cloud Cheshire</title>

<link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="shortcut icon" href="/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<link rel="manifest" href="/site.webmanifest" />

<style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

    body {
        margin: 0;
        background: #000;
        color: #e0faff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 20px;
        font-family: 'Orbitron', sans-serif;
        text-align: center;
    }

    h1 {
        font-size: 3.2rem;
        margin-bottom: 10px;
        text-shadow: 0 0 20px #00eaff, 0 0 40px #00bcd4;
        letter-spacing: 4px;
    }

    p.subtext {
        font-size: 1.2rem;
        opacity: 0.85;
        letter-spacing: 2px;
        text-shadow: 0 0 10px #00eaff;
        margin-bottom: 40px;
    }

    .glow-box {
        max-width: 750px;
        padding: 25px;
        border: 1px solid #00eaff;
        border-radius: 10px;
        box-shadow: 0 0 20px #00eaff55;
        background: rgba(0, 40, 50, 0.25);
        text-shadow: 0 0 8px #00eaff;
    }

    .glow-btn {
        display: inline-block;
        margin-top: 35px;
        padding: 14px 32px;
        font-size: 1.2rem;
        letter-spacing: 3px;
        color: #00eaff;
        text-decoration: none;
        border: 2px solid #00eaff;
        border-radius: 8px;
        font-family: 'Orbitron', sans-serif;
        box-shadow: 0 0 15px #00eaff88, 0 0 30px #00eaff55;
        text-shadow: 0 0 10px #00eaff;
        transition: 0.3s ease-in-out;
    }

    .glow-btn:hover {
        color: #000;
        background: #00eaff;
        box-shadow: 0 0 25px #00eaff, 0 0 40px #00c3ff, 0 0 70px #00eaff;
        transform: scale(1.08);
    }

    .back-link {
        margin-top: 40px;
    }
</style>
</head>
<body>

<h1>CONTACT</h1>
<p class="subtext">Get in touch with Cloud Cheshire</p>

<div class="glow-box">
    <p>You can contact Cloud Cheshire directly using the options below:</p>
    <ul style="list-style:none; padding:0; font-size:1.1rem; line-height:1.8;">
        <li>• Email: jason@cloudcheshire.co.uk</li>
        <li>• Phone: 07798 905131</li>
    </ul>

    <a href="mailto:jason@cloudcheshire.co.uk" class="glow-btn">EMAIL US</a>
    <br><br>
    <a href="tel:+447798905131" class="glow-btn">CALL US</a>
</div>

<div class="back-link">
    <a href="/index.html" class="glow-btn">BACK</a>
</div>

</body>
</html>
