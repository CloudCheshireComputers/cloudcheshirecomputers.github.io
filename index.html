<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cloud Cheshire Computers</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

    body {
        margin: 0;
        background: #000;
        color: #e0faff;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: 'Orbitron', sans-serif;
        text-align: center;
        overflow: hidden;
    }

    h1 {
        font-size: 4rem;
        text-shadow: 0 0 20px #00eaff, 0 0 40px #00bcd4;
        animation: pulse 4s ease-in-out infinite;
        letter-spacing: 6px;
    }

    p {
        font-size: 1.2rem;
        margin-top: 15px;
        opacity: 0.85;
        letter-spacing: 4px;
        text-shadow: 0 0 10px #00eaff;
    }

    /* Prometheus-style slow breathing glow */
    @keyframes pulse {
        0% { text-shadow: 0 0 12px #00eaff, 0 0 25px #0099aa; opacity: 0.9; }
        50% { text-shadow: 0 0 40px #00eaff, 0 0 80px #00c3ff; opacity: 1; }
        100% { text-shadow: 0 0 12px #00eaff, 0 0 25px #0099aa; opacity: 0.9; }
    }

    /* Subtle holographic scanline */
    .scanline {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 2px;
        background: rgba(0, 255, 255, 0.15);
        animation: scan 7s linear infinite;
    }

    @keyframes scan {
        0% { top: 0; }
        100% { top: 100%; }
    }

    /* Ambient floating particles */
    .particle {
        position: absolute;
        width: 2px;
        height: 2px;
        background: #00eaff;
        opacity: 0.4;
        border-radius: 50%;
        animation: drift 10s linear infinite;
    }

    @keyframes drift {
        from { transform: translateY(0); opacity: 0.6; }
        to { transform: translateY(-200vh); opacity: 0; }
    }
</style>
</head>
<body>
<div class="scanline"></div>

<!-- Generate floating particles -->
<script>
for (let i = 0; i < 40; i++) {
    let p = document.createElement('div');
    p.classList.add('particle');
    p.style.left = Math.random() * 100 + 'vw';
    p.style.top = Math.random() * 100 + 'vh';
    p.style.animationDuration = (8 + Math.random() * 8) + 's';
    document.body.appendChild(p);
}
</script>

<h1>CLOUD CHESHIRE</h1>
<p>Et in pulverem reverteris</p>
<p>07798905131</p>

</body>
</html>
