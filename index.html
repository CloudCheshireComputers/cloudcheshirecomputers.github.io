<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cloud Cheshire Computers</title>

<!-- Favicons -->
<link rel="icon" type="image/png" href="/favicon-96x96.png" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<link rel="manifest" href="/site.webmanifest" />

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

/* PAGE BASE */
body {
  margin: 0;
  background: #000;
  color: #e0faff;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Orbitron', sans-serif;
  text-align: center;
  overflow: hidden;
}

/* LOGO */
.logo-alien {
  width: 180px;
  margin-bottom: 25px;
  filter: drop-shadow(0 0 25px #00eaff);
  animation: logoFade 1.4s ease-out forwards;
  opacity: 0;
}

@keyframes logoFade {
  0% { opacity: 0; transform: scale(0.75); filter: blur(6px); }
  100% { opacity: 1; transform: scale(1); filter: blur(0); }
}

/* HEADER */
h1 {
  font-size: 4rem;
  text-shadow: 0 0 20px #00eaff, 0 0 40px #00bcd4;
  animation: pulse 4s ease-in-out infinite;
  letter-spacing: 6px;
  margin: 0;
}
p {
  font-size: 1.2rem;
  margin-top: 15px;
  opacity: 0.85;
  letter-spacing: 4px;
  text-shadow: 0 0 10px #00eaff;
}

/* PULSE ANIMATION */
@keyframes pulse {
  0% { text-shadow: 0 0 12px #00eaff; opacity: 0.9; }
  50% { text-shadow: 0 0 40px #00eaff; opacity: 1; }
  100% { text-shadow: 0 0 12px #00eaff; opacity: 0.9; }
}

/* SCANLINE */
.scanline {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 2px;
  background: rgba(0,255,255,0.15);
  animation: scan 7s linear infinite;
}
@keyframes scan {
  0% { top: 0; }
  100% { top: 100%; }
}

/* PARTICLE EFFECT */
.particle {
  position: absolute;
  width: 2px;
  height: 2px;
  background: #00eaff;
  opacity: 0.4;
  border-radius: 50%;
  animation: drift 10s linear infinite;
}
@keyframes drift {
  from { transform: translateY(0); opacity: 0.6; }
  to { transform: translateY(-200vh); opacity: 0; }
}

/* BUTTONS */
.button-row {
  display: flex;
  gap: 20px;
  margin-top: 35px;
  justify-content: center;
}
.glow-btn {
  padding: 14px 32px;
  font-size: 1.2rem;
  letter-spacing: 3px;
  color: #00eaff;
  text-decoration: none;
  border: 2px solid #00eaff;
  border-radius: 8px;
  font-family: 'Orbitron', sans-serif;
  box-shadow: 0 0 15px #00eaff88, 0 0 30px #00eaff55;
  text-shadow: 0 0 10px #00eaff;
  transition: 0.3s ease-in-out;
}
.glow-btn:hover {
  color: #000;
  background: #00eaff;
  box-shadow: 0 0 25px #00eaff, 0 0 40px #00c3ff;
  transform: scale(1.08);
}

/* TERMS */
.terms {
  max-width: 900px;
  margin-top: 22px;
  font-size: 0.8rem;
  line-height: 1.45;
  color: #cde7eb;
  text-shadow: 0 0 6px rgba(0,234,255,0.45);
}

</style>
</head>
<body>

<div class="scanline"></div>

<!-- PARTICLES -->
<script>
for (let i = 0; i < 40; i++) {
  let p = document.createElement('div');
  p.classList.add('particle');
  p.style.left = Math.random() * 100 + 'vw';
  p.style.top = Math.random() * 100 + 'vh';
  p.style.animationDuration = (8 + Math.random() * 8) + 's';
  document.body.appendChild(p);
}
</script>

<!-- ✅ALIEN LOGO INSERTED HERE -->
<img src="/images/alien-logo.png" alt="Cloud Cheshire Alien Logo" class="logo-alien">

<h1>CLOUD CHESHIRE</h1>
<p>Cheshire’s Trusted Computer Specialist</p>

<!-- BUTTONS -->
<div class="button-row">
  <a href="/support.html" class="glow-btn">SUPPORT</a>
  <a href="/store.html" class="glow-btn">STORE</a>
  <a href="/contact.html" class="glow-btn">CONTACT</a>
</div>

<div class="terms">
  <b>Terms & Conditions:</b> All content on this website is the exclusive property of the owner. No part may be copied, reproduced, or used without permission.
</div>

</body>
</html>
