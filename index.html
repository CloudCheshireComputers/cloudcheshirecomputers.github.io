<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cloud Cheshire Computers</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

    body {
        margin: 0;
        background: #000;
        color: #e0faff;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: 'Orbitron', sans-serif;
        text-align: center;
        overflow: hidden;
    }

    h1 {
        font-size: 4rem;
        text-shadow: 0 0 20px #00eaff, 0 0 40px #00bcd4;
        animation: pulse 4s ease-in-out infinite;
        letter-spacing: 6px;
    }

    p {
        font-size: 1.2rem;
        margin-top: 15px;
        opacity: 0.85;
        letter-spacing: 4px;
        text-shadow: 0 0 10px #00eaff;
    }

    @keyframes pulse {
        0% { text-shadow: 0 0 12px #00eaff, 0 0 25px #0099aa; opacity: 0.9; }
        50% { text-shadow: 0 0 40px #00eaff, 0 0 80px #00c3ff; opacity: 1; }
        100% { text-shadow: 0 0 12px #00eaff, 0 0 25px #0099aa; opacity: 0.9; }
    }

    .scanline {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 2px;
        background: rgba(0, 255, 255, 0.15);
        animation: scan 7s linear infinite;
    }

    @keyframes scan {
        0% { top: 0; }
        100% { top: 100%; }
    }

    .particle {
        position: absolute;
        width: 2px;
        height: 2px;
        background: #00eaff;
        opacity: 0.4;
        border-radius: 50%;
        animation: drift 10s linear infinite;
    }

    @keyframes drift {
        from { transform: translateY(0); opacity: 0.6; }
        to { transform: translateY(-200vh); opacity: 0; }
    }

    .icon-row {
        display: flex;
        gap: 20px;
        margin-top: 20px;
        align-items: center;
        justify-content: center;
    }

    .mail-icon,
    .phone-icon {
        width: 45px;
        cursor: pointer;
        filter: drop-shadow(0 0 8px #00eaff);
        transition: transform 0.3s ease, filter 0.3s ease;
    }

    .mail-icon:hover,
    .phone-icon:hover {
        transform: scale(1.15);
        filter: drop-shadow(0 0 15px #00eaff);
    }
</style>
</head>
<body>
<div class="scanline"></div>

<script>
for (let i = 0; i < 40; i++) {
    let p = document.createElement('div');
    p.classList.add('particle');
    p.style.left = Math.random() * 100 + 'vw';
    p.style.top = Math.random() * 100 + 'vh';
    p.style.animationDuration = (8 + Math.random() * 8) + 's';
    document.body.appendChild(p);
}
</script>

<h1>CLOUD CHESHIRE</h1>
<p>Et in pulverem reverteris</p>

<div class="icon-row">
    <!-- Email -->
    mailto:jason@cloudcheshire.co.uk
        <svg class="mail-icon" viewBox="0 0 64 64" fill="none" role="img" aria-hidden="true">
            <rect x="4" y="12" width="56" height="40" rx="6" stroke="#00eaff" stroke-width="3"/>
            <path d="M8 16L32 34L56 16" stroke="#00eaff" stroke-width="3" />
            <path d="M8 44L24 30" stroke="#00eaff" stroke-width="3" opacity="0.7"/>
            <path d="M56 44L40 30" stroke="#00eaff" stroke-width="3" opacity="0.7"/>
            <circle cx="32" cy="34" r="2" fill="#00eaff"/>
        </svg>
    </a>

    <!-- Phone -->
    tel:07798905131
        <svg class="phone-icon" viewBox="0 0 64 64" fill="none" role="img" aria-hidden="true">
            <!-- Neon phone handset with glow-style strokes -->
            <defs>
                <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                    <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#00eaff" flood-opacity="0.9" />
                </filter>
            </defs>
            <g stroke="#00eaff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
                <!-- Outer rounded frame to match mail icon geometry -->
                <rect x="4" y="4" width="56" height="56" rx="10" opacity="0.35"></rect>
                <!-- Stylised handset -->
                <path d="M22 18c3 0 6 3 6 6 0 1-0.3 2-0.8 3l4.2 4.2c1-0.5 2-0.8 3-0.8 3 0 6 3 6 6 0 1-0.3 2-0.8 3l-3.2 3.2c-2.2 2.2-7.8 1.5-13.7-4.4s-6.6-11.5-4.4-13.7l3.2-3.2c1-1 2-1.3 3-1.3z" />
                <!-- Accent lines -->
                <path d="M40 22c3 2 5 4 6 7" opacity="0.7"/>
            </g>
        </svg>
    </a>
</div>

</body>
</html>
