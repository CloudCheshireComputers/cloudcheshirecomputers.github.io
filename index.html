<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cloud Cheshire Computers</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

    body {
        margin: 0;
        background: #000;
        color: #e0faff;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: 'Orbitron', sans-serif;
        text-align: center;
        overflow: hidden;
    }

    h1 {
        font-size: 4rem;
        text-shadow: 0 0 20px #00eaff, 0 0 40px #00bcd4;
        animation: pulse 4s ease-in-out infinite;
        letter-spacing: 6px;
    }

    p {
        font-size: 1.2rem;
        margin-top: 15px;
        opacity: 0.85;
        letter-spacing: 4px;
        text-shadow: 0 0 10px #00eaff;
    }

    /* Pulse animation */
    @keyframes pulse {
        0% { text-shadow: 0 0 12px #00eaff, 0 0 25px #0099aa; opacity: 0.9; }
        50% { text-shadow: 0 0 40px #00eaff, 0 0 80px #00c3ff; opacity: 1; }
        100% { text-shadow: 0 0 12px #00eaff, 0 0 25px #0099aa; opacity: 0.9; }
    }

    /* Scanline */
    .scanline {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 2px;
        background: rgba(0, 255, 255, 0.15);
        animation: scan 7s linear infinite;
    }

    @keyframes scan {
        0% { top: 0; }
        100% { top: 100%; }
    }

    /* Floating particles */
    .particle {
        position: absolute;
        width: 2px;
        height: 2px;
        background: #00eaff;
        opacity: 0.4;
        border-radius: 50%;
        animation: drift 10s linear infinite;
    }

    @keyframes drift {
        from { transform: translateY(0); opacity: 0.6; }
        to { transform: translateY(-200vh); opacity: 0; }
    }

    /* Futuristic mailbox icon */
    .mail-icon {
        margin-top: 20px;
        width: 60px;
        cursor: pointer;
        filter: drop-shadow(0 0 8px #00eaff);
        transition: transform 0.3s ease, filter 0.3s ease;
    }

    .mail-icon:hover {
        transform: scale(1.15);
        filter: drop-shadow(0 0 15px #00eaff);
    }

</style>
</head>
<body>
<div class="scanline"></div>

<!-- Floating particles -->
<script>
for (let i = 0; i < 40; i++) {
    let p = document.createElement('div');
    p.classList.add('particle');
    p.style.left = Math.random() * 100 + 'vw';
    p.style.top = Math.random() * 100 + 'vh';
    p.style.animationDuration = (8 + Math.random() * 8) + 's';
    document.body.appendChild(p);
}
</script>

<h1>CLOUD CHESHIRE</h1>
<p>Et in pulverem reverteris</p>
<p>07798905131</p>

<!-- Futuristic mailbox icon (SVG) -->
<a href="mailto:jason@cloudcheshire.co.uk">
    <svg class="mail-icon" viewBox="0 0 64 64" fill="none">
        <rect x="4" y="12" width="56" height="40" rx="6" stroke="#00eaff" stroke-width="3"/>
        <path d="M8 16L32 34L56 16" stroke="#00eaff" stroke-width="3" />
        <path d="M8 44L24 30" stroke="#00eaff" stroke-width="3" opacity="0.7"/>
        <path d="M56 44L40 30" stroke="#00eaff" stroke-width="3" opacity="0.7"/>
        <circle cx="32" cy="34" r="2" fill="#00eaff"/>
    </svg>
</a>

</body>
</html>
