<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Store – Cloud Cheshire</title>

<link rel="icon" type="image/png" href="/favicon-96x96.png" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<link rel="manifest" href="/site.webmanifest" />

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

body {
  margin: 0;
  background: #000;
  color: #e0faff;
  min-height: 100vh;
  padding: 40px 20px;
  font-family: 'Orbitron', sans-serif;
  text-align: center;
}

h1 {
  font-size: 3.2rem;
  margin-bottom: 10px;
  text-shadow: 0 0 20px #00eaff, 0 0 40px #00bcd4;
  letter-spacing: 4px;
}

p.subtext {
  font-size: 1.2rem;
  opacity: 0.85;
  letter-spacing: 2px;
  text-shadow: 0 0 10px #00eaff;
  margin-bottom: 40px;
}

.store-container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 30px;
  margin-top: 20px;
}

.item {
  width: 300px;
  padding: 15px;
  background: rgba(0, 40, 50, 0.25);
  border: 1px solid #00eaff;
  border-radius: 10px;
  box-shadow: 0 0 20px #00eaff55;
  transition: 0.3s;
}

.item:hover {
  transform: scale(1.05);
  box-shadow: 0 0 30px #00eaff;
}

.item img {
  width: 100%;
  border-radius: 10px;
}

.item h2 {
  font-size: 1.1rem;
  margin: 10px 0;
  text-shadow: 0 0 8px #00eaff;
}

.item a {
  color: #00eaff;
  text-decoration: none;
  font-weight: bold;
  text-shadow: 0 0 6px #00eaff;
}

.glow-btn {
  display: inline-block;
  margin-top: 35px;
  padding: 14px 32px;
  font-size: 1.2rem;
  letter-spacing: 3px;
  color: #00eaff;
  text-decoration: none;
  border: 2px solid #00eaff;
  border-radius: 8px;
  font-family: 'Orbitron', sans-serif;
  box-shadow: 0 0 15px #00eaff88, 0 0 30px #00eaff55;
  text-shadow: 0 0 10px #00eaff;
  transition: 0.3s ease-in-out;
}

.glow-btn:hover {
  color: #000;
  background: #00eaff;
  box-shadow: 0 0 25px #00eaff, 0 0 40px #00c3ff;
  transform: scale(1.08);
}
</style>
</head>
<body>

<h1>STORE</h1>
<p class="subtext">Live listings from Cloud Cheshire Computers</p>

<div class="store-container" id="items"></div>

<a href="/index.html" class="glow-btn">BACK</a>

<script>
const rssUrl = "https://www.ebay.co.uk/sch/cloudcheshirecomputers2025/m.html?_rss=1";

fetch("https://api.allorigins.win/get?url=" + encodeURIComponent(rssUrl))
  .then(response => response.json())
  .then(data => {
    const parser = new DOMParser();
    const xml = parser.parseFromString(data.contents, "text/xml");
    const items = xml.querySelectorAll("item");
    const container = document.getElementById("items");

    items.forEach(item => {
      const title = item.querySelector("title").textContent;
      const link = item.querySelector("link").textContent;
      const image = "https://via.placeholder.com/300x200?text=Cloud+Cheshire";

      const card = document.createElement("div");
      card.className = "item";

      card.innerHTML = `
        <img src="${image}" alt="Listing Image">
        <h2>${title}</h2>
        <a href="${link}" target="_blank">VIEW ON EBAY</a>
      `;

      container.appendChild(card);
    });
  })
  .catch(err => {
    document.getElementById("items").innerHTML = "<p>Unable to load listings right now.</p>";
  });
</script>

</body>
</html>
