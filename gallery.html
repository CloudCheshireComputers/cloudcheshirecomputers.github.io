<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery – Cloud Cheshire</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

    body {
      margin: 0;
      background: #000;
      color: #e0faff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: 'Orbitron', sans-serif;
      text-align: center;
    }

    .page-content {
      padding: 50px 20px;
    }

    h1 {
      font-size: 3rem;
      letter-spacing: 5px;
      text-shadow: 0 0 20px #00eaff, 0 0 40px #00bcd4;
      margin-bottom: 10px;
    }

    p.subtext {
      opacity: 0.85;
      letter-spacing: 3px;
      margin-bottom: 50px;
      text-shadow: 0 0 10px #00eaff;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .gallery-tile {
      background: rgba(0, 40, 50, 0.35);
      border: 2px solid #00eaff;
      border-radius: 12px;
      height: 220px;
      box-shadow: 0 0 20px #00eaff66;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.35s ease;
      overflow: hidden;
    }

    .gallery-tile:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px #00eaff, 0 0 60px #00c3ff;
    }

    .gallery-tile span {
      letter-spacing: 3px;
      opacity: 0.7;
      text-shadow: 0 0 8px #00eaff;
    }

    .gallery-tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .back-link {
      margin-top: auto;
      padding: 40px 0;
    }

    .glow-btn {
      padding: 14px 32px;
      font-size: 1.1rem;
      letter-spacing: 3px;
      color: #00eaff;
      text-decoration: none;
      border: 2px solid #00eaff;
      border-radius: 8px;
      box-shadow: 0 0 15px #00eaff88;
      text-shadow: 0 0 10px #00eaff;
      transition: 0.3s ease-in-out;
      display: inline-block;
    }

    .glow-btn:hover {
      background: #00eaff;
      color: #000;
      box-shadow: 0 0 25px #00eaff, 0 0 40px #00c3ff;
      transform: scale(1.08);
    }
  </style>
</head>

<body>

  <div class="page-content">
    <h1>GALLERY</h1>
    <p class="subtext">Our Work • Builds • Repairs • Technology</p>

    <div class="gallery-grid">

      <!-- IMAGE 1 (ACTUAL PHOTO ADDED) -->
      <div class="gallery-tile">
        <img src="images/image1.png" alt="Gallery Image 1">
      </div>

      <div class="gallery-tile"><span>IMAGE 2</span></div>
      <div class="gallery-tile"><span>IMAGE 3</span></div>
      <div class="gallery-tile"><span>IMAGE 4</span></div>
      <div class="gallery-tile"><span>IMAGE 5</span></div>
      <div class="gallery-tile"><span>IMAGE 6</span></div>
      <div class="gallery-tile"><span>IMAGE 7</span></div>
      <div class="gallery-tile"><span>IMAGE 8</span></div>

    </div>
  </div>

  <div class="back-link">
    <a href="/index.html" class="glow-btn">BACK</a>
  </div>

</body>
</html>
